- name: Configure Shipping server
  hosts: shipping
  become: yes
  tasks:
    - name: Install Maven and MySQL
      ansible.builtin.dnf:
        name: "{{ item }}"
        state: present
      loop:
        - maven
        - mysql

    - name: Create system user roboshop
      ansible.builtin.user:
        name: roboshop
        system: true
        home: /app
        shell: /sbin/nologin
        comment: "roboshop system user"

    - name: Delete app directory
      ansible.builtin.file:
        path: /app
        state: absent

    - name: Create a new directory
      ansible.builtin.file:
        path: /app
        state: directory

    - name: Delete shipping zip file
      ansible.builtin.file:
        path: /tmp/shipping.zip
        state: absent

    - name: Downloading the shipping application
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip
        dest: /tmp/shipping.zip

    - name: Unzip the shipping file
      ansible.builtin.unarchive:
        src: /tmp/shipping.zip
        dest: /app
        remote_src: yes

    - name: To Install dependencies
      ansible.builtin.command: mvn clean package
      args:
        chdir: /app

    - name: Install dependencies
      ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar
      args:
        chdir: /app

    - name: Create systemctl service
      ansible.builtin.template:
        src: shipping.src
        dest: /etc/systemd/system/shipping.service

    - name: Demon reload
      ansible.builtin.systemd_service:
        demon_reload: true

    - name: Import Shipping data
      community.mysql.mysql_db:
        state: import
        name: all
        login_host: "{{ MySQL_HOST }}"
        login_user: root
        login_password: RoboShop@1
        target: "{{ item }}"
      loop:
        - /app/db/schema.sql
        - /app/db/app-user.sql
        - /app/db/master-data.sql

    - name: Start and Enable Shipping
      ansible.builtin.service:
        name: shipping
        state: restarted
        enable: yes
